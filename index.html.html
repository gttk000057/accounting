<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記帳工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0c0c10;--surface:#15151c;--surface2:#1e1e28;--border:#28283a;
  --accent:#7c6af7;--accent2:#e8637c;--accent3:#4ecdc4;
  --text:#eeeef5;--text2:#8888a8;--text3:#4a4a62;
  --green:#52d9a8;--red:#e8637c;--yellow:#f0c94a;
  --radius:14px;--radius-sm:9px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:14px;min-height:100vh;}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;}
.login-card{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px 24px;animation:fadeUp .4s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.login-logo{font-size:32px;text-align:center;margin-bottom:8px;}
.login-title{text-align:center;font-size:20px;font-weight:700;margin-bottom:4px;}
.login-sub{text-align:center;font-size:12px;color:var(--text3);margin-bottom:24px;}
.login-label{font-size:11px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;display:block;}
.login-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:14px;padding:11px 14px;margin-bottom:12px;transition:border-color .15s;}
.login-input:focus{outline:none;border-color:var(--accent);}
.login-btn{width:100%;padding:12px;border:none;border-radius:var(--radius-sm);background:var(--accent);color:#fff;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:filter .15s;}
.login-btn:hover{filter:brightness(1.1);}
.login-btn:disabled{opacity:.5;cursor:not-allowed;}
.login-hint{text-align:center;font-size:11px;color:var(--text3);margin-top:14px;line-height:1.7;}
.login-msg{text-align:center;padding:16px 0;font-size:14px;color:var(--text2);line-height:1.7;display:none;}
.login-msg span{color:var(--accent);font-weight:600;}
.login-err{color:var(--red);font-size:12px;margin-top:8px;text-align:center;display:none;}

/* APP */
#app{display:none;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 0;}
.topbar-title{font-size:17px;font-weight:700;} .topbar-title span{color:var(--accent);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);transition:background .3s;}
.sync-dot.busy{background:var(--yellow);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn-logout{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text3);font-family:inherit;font-size:11px;padding:5px 10px;cursor:pointer;}
.btn-logout:hover{border-color:var(--red);color:var(--red);}
.tab-bar{display:flex;gap:6px;padding:12px 16px 0;overflow-x:auto;scrollbar-width:none;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-btn{flex:1;min-width:88px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text3);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;}
.tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.tab-btn:hover:not(.active){border-color:var(--accent);color:var(--accent);}
.page{display:none;padding:14px 16px 40px;}
.page.active{display:block;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:14px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 12px;}
.card-label{font-size:10px;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px;}
.card-value{font-family:'DM Mono',monospace;font-size:17px;font-weight:500;}
.cv-accent{color:var(--accent);}.cv-accent2{color:var(--accent2);}.cv-green{color:var(--green);}.cv-red{color:var(--red);}.cv-yellow{color:var(--yellow);}
.alert-bar{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent2);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:14px;font-size:13px;display:none;line-height:1.6;}
.alert-bar.on{display:block;}
.form-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px;margin-bottom:14px;}
.form-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:13px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.ff{display:flex;flex-direction:column;gap:5px;}
.ff.full{grid-column:1/-1;}
label{font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;}
input,select{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:13px;padding:8px 10px;transition:border-color .15s;width:100%;-webkit-appearance:none;}
input:focus,select:focus{outline:none;border-color:var(--accent);}
input[readonly]{color:var(--text2);}
select option{background:var(--bg);}
.form-actions{margin-top:12px;display:flex;gap:8px;}
.form-err{color:var(--red);font-size:12px;margin-top:6px;display:none;}
.btn{padding:9px 18px;border-radius:var(--radius-sm);border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{filter:brightness(1.1);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2);}.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.btn-del{background:transparent;border:none;color:var(--text3);padding:4px 9px;font-size:11px;cursor:pointer;border-radius:4px;transition:all .2s;}
.btn-del:hover,.btn-del.confirm{background:rgba(232,99,124,.15);color:var(--red);}
.btn-del.confirm{font-weight:700;}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;min-width:520px;}
thead th{background:var(--surface2);padding:9px 12px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;}
tbody td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text2);font-size:13px;vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--surface2);}
.mono{font-family:'DM Mono',monospace;font-size:12px;}
.tag{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;}
.tag-income{background:rgba(82,217,168,.15);color:var(--green);}
.tag-expense{background:rgba(232,99,124,.15);color:var(--red);}
.tag-split{background:rgba(78,205,196,.15);color:var(--accent3);}
.tag-a{background:rgba(124,106,247,.15);color:var(--accent);}
.tag-b{background:rgba(232,99,124,.15);color:var(--accent2);}
.tag-custom{background:rgba(240,201,74,.15);color:var(--yellow);}
.pos{color:var(--green)!important;}.neg{color:var(--red)!important;}
.empty td{text-align:center;padding:32px;color:var(--text3);font-size:13px;}
.roi-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:15px;margin-top:14px;}
.roi-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
@media(max-width:480px){.form-grid{grid-template-columns:1fr;}.summary-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">💰</div>
    <div class="login-title">記帳工具</div>
    <div class="login-sub">輸入 4 位數密碼</div>
    <div id="login-form">
      <label class="login-label">密碼</label>
      <input class="login-input" type="password" id="login-pin" placeholder="••••" maxlength="4" inputmode="numeric" onkeydown="if(event.key==='Enter')checkPin()">
      <button class="login-btn" onclick="checkPin()">進入</button>
      <div class="login-err" id="login-err"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-title">💰 <span>記帳工具</span></div>
    <div class="topbar-right">
      <div class="sync-dot" id="sync-dot"></div>
      <button class="btn-logout" onclick="logout()">登出</button>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab(0)">👫 共同支出</button>
    <button class="tab-btn" onclick="switchTab(1)">🏠 房貸 &amp; 報酬</button>
  </div>

  <!-- PAGE 1 -->
  <div class="page active" id="page0">
    <div class="summary-grid">
      <div class="card"><div class="card-label">媽媽 淨支出</div><div class="card-value cv-accent mono" id="p1-a-total">$0</div></div>
      <div class="card"><div class="card-label">我 淨支出</div><div class="card-value cv-accent2 mono" id="p1-b-total">$0</div></div>
      <div class="card"><div class="card-label">總支出</div><div class="card-value mono" id="p1-total">$0</div></div>
      <div class="card"><div class="card-label">總收入</div><div class="card-value cv-green mono" id="p1-income-total">$0</div></div>
    </div>
    <div class="alert-bar" id="p1-alert"></div>
    <div class="form-box">
      <div class="form-title">新增記錄</div>
      <div class="form-grid">
        <div class="ff"><label>日期</label><input type="date" id="p1-date"></div>
        <div class="ff"><label>類型</label>
          <select id="p1-type" onchange="p1TypeChange()">
            <option value="支出">支出</option>
            <option value="收入">收入</option>
          </select>
        </div>
        <div class="ff"><label>內容</label><input type="text" id="p1-desc" placeholder="說明..."></div>
        <div class="ff"><label>金額</label><input type="number" id="p1-amt" placeholder="0" min="0" oninput="p1Calc()"></div>
        <div class="ff"><label>分攤方式</label>
          <select id="p1-split" onchange="p1Calc()">
            <option value="平分">平分</option>
            <option value="媽媽">媽媽</option>
            <option value="我">我</option>
            <option value="自訂">自訂</option>
          </select>
        </div>
        <div class="ff"><label id="lbl-a">媽媽 支出</label><input type="number" id="p1-a" placeholder="自動計算" oninput="p1SyncB()"></div>
        <div class="ff"><label id="lbl-b">我 支出</label><input type="number" id="p1-b" placeholder="自動計算" oninput="p1SyncA()"></div>
        <div class="ff full"><label>備註</label><input type="text" id="p1-note" placeholder="選填"></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="p1Add()">＋ 新增</button>
        <button class="btn btn-outline" onclick="p1Reset()">清空</button>
      </div>
      <div class="form-err" id="p1-err">請填寫日期、內容與金額</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>日期</th><th>類型</th><th>內容</th><th>金額</th><th>分攤</th><th>媽媽</th><th>我</th><th>備註</th><th></th></tr></thead>
        <tbody id="p1-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- PAGE 2 -->
  <div class="page" id="page1">
    <div class="summary-grid">
      <div class="card"><div class="card-label">累積租金</div><div class="card-value cv-green mono" id="p2-rent-t">$0</div></div>
      <div class="card"><div class="card-label">累積已繳房貸</div><div class="card-value cv-red mono" id="p2-loan-t">$0</div></div>
      <div class="card"><div class="card-label">帳戶餘額</div><div class="card-value cv-yellow mono" id="p2-bal-t">$0</div></div>
      <div class="card"><div class="card-label">我的累積租金收益</div><div class="card-value cv-green mono" id="p2-each-t">$0</div></div>
    </div>
    <div class="form-box">
      <div class="form-title">新增月份記錄</div>
      <div class="form-grid">
        <div class="ff"><label>日期</label><input type="date" id="p2-date"></div>
        <div class="ff"><label>租金收入</label><input type="number" id="p2-rent" placeholder="請輸入金額" min="0" oninput="p2AutoCalc()"></div>
        <div class="ff"><label>撥入專戶</label><input type="number" id="p2-deposit" placeholder="請輸入金額" min="0" oninput="p2AutoCalc()"></div>
        <div class="ff"><label>房貸支出</label><input type="number" id="p2-loan" placeholder="請輸入金額" min="0" oninput="p2AutoCalc()"></div>
        <div class="ff"><label>每月結餘（自動）</label><input type="number" id="p2-surplus" placeholder="自動計算" readonly></div>
        <div class="ff"><label>我的租金收益（自動）</label><input type="number" id="p2-each" placeholder="自動計算" readonly></div>
        <div class="ff"><label>帳戶餘額</label><input type="number" id="p2-bal-input" placeholder="請輸入金額"></div>
        <div class="ff full"><label>備註</label><input type="text" id="p2-note" placeholder="選填"></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="p2Add()">＋ 新增</button>
        <button class="btn btn-outline" onclick="p2Reset()">清空</button>
      </div>
      <div class="form-err" id="p2-err">請選擇日期</div>
    </div>
    <div class="table-wrap" style="margin-bottom:0;">
      <table>
        <thead><tr><th>日期</th><th>租金</th><th>撥入專戶</th><th>房貸</th><th>每月結餘</th><th>我的收益</th><th>專戶累積</th><th>帳戶餘額</th><th>備註</th><th></th></tr></thead>
        <tbody id="p2-tbody"></tbody>
      </table>
    </div>
    <div class="roi-box">
      <div class="roi-title">📈 我的投資報酬率</div>
      <div class="summary-grid" style="margin-bottom:14px;">
        <div class="card"><div class="card-label">我的總花費</div><div class="card-value cv-accent2 mono" id="roi-mycost">$0</div></div>
        <div class="card"><div class="card-label">累積租金收益</div><div class="card-value cv-green mono" id="roi-cashback">$0</div></div>
        <div class="card"><div class="card-label">累積報酬率</div><div class="card-value mono" id="roi-rate">0%</div></div>
      </div>
      <div class="form-box" style="margin-bottom:0;background:var(--bg);">
        <div class="form-title">報酬率趨勢</div>
        <canvas id="roi-chart" height="180" style="display:none;"></canvas>
        <div id="roi-chart-empty" style="text-align:center;color:var(--text3);font-size:13px;padding:20px 0;">新增第二頁記錄後自動顯示圖表</div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://eulwtweuvxetuxienjsl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV1bHd0d2V1dnhldHV4aWVuanNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MjA2ODEsImV4cCI6MjA5NTE5NjY4MX0.6LFvmmo7fvUFgFbT_GXWqfF5tQJHsUlaAQd9FOIB21U';
const CORRECT_PIN = '5070';
// 固定 user_id，對應密碼 5070
const FIXED_USER_ID = 'a1b2c3d4-5070-5070-5070-507050705070';

const $ = id => document.getElementById(id);
const fmt  = n => '$' + Number(n).toLocaleString('zh-TW',{maximumFractionDigits:0});
const fmtN = n => (n>=0?'+$':'-$') + Math.abs(n).toLocaleString('zh-TW',{maximumFractionDigits:0});
const fmtP = n => (n>=0?'+':'')+n.toFixed(2)+'%';
const today = () => new Date().toISOString().slice(0,10);

// 用 anon key 直接存取，user_id 用固定值
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { persistSession: false }
});

let p1=[], p2=[];
let deleteTarget = null;
let roiChart = null;

function syncBusy(){ $('sync-dot').className='sync-dot busy'; }
function syncDone(){ $('sync-dot').className='sync-dot'; }

function checkPin(){
  const pin = $('login-pin').value.trim();
  if(pin === CORRECT_PIN){
    $('login-screen').style.display='none';
    $('app').style.display='block';
    $('p1-date').value=today();
    $('p2-date').value=today();
    loadAll();
  } else {
    $('login-err').textContent='密碼錯誤';
    $('login-err').style.display='block';
    $('login-pin').value='';
    setTimeout(()=>$('login-err').style.display='none', 2000);
  }
}

function logout(){
  p1=[]; p2=[];
  $('app').style.display='none';
  $('login-screen').style.display='flex';
  $('login-pin').value='';
}

// ── Tab ──
function switchTab(i){
  document.querySelectorAll('.tab-btn').forEach((b,j)=>b.classList.toggle('active',i===j));
  document.querySelectorAll('.page').forEach((p,j)=>p.classList.toggle('active',i===j));
}

// ── Load all data ──
async function loadAll(){
  syncBusy();
  const [r1,r2] = await Promise.all([
    sb.from('p1').select('*').eq('user_id', FIXED_USER_ID).order('date'),
    sb.from('p2').select('*').eq('user_id', FIXED_USER_ID).order('date')
  ]);
  p1 = r1.data||[]; p2 = r2.data||[];
  p1Render(); p2Render();
  syncDone();
}

// ══ PAGE 1 ══
function p1TypeChange(){
  const isIncome = $('p1-type').value==='收入';
  $('lbl-a').textContent = isIncome?'媽媽 收入':'媽媽 支出';
  $('lbl-b').textContent = isIncome?'我 收入':'我 支出';
  $('p1-split').value='平分'; p1Calc();
}
function p1Calc(){
  const amt=parseFloat($('p1-amt').value)||0, mode=$('p1-split').value;
  $('p1-a').readOnly=true; $('p1-b').readOnly=true;
  if(mode==='平分'){$('p1-a').value=(amt/2).toFixed(0);$('p1-b').value=(amt/2).toFixed(0);}
  else if(mode==='媽媽'){$('p1-a').value=amt;$('p1-b').value=0;}
  else if(mode==='我'){$('p1-a').value=0;$('p1-b').value=amt;}
  else{$('p1-a').readOnly=false;$('p1-b').readOnly=false;}
}
function p1SyncB(){ const a=parseFloat($('p1-a').value)||0,t=parseFloat($('p1-amt').value)||0; $('p1-b').value=Math.max(0,t-a).toFixed(0); }
function p1SyncA(){ const b=parseFloat($('p1-b').value)||0,t=parseFloat($('p1-amt').value)||0; $('p1-a').value=Math.max(0,t-b).toFixed(0); }

async function p1Add(){
  const date=$('p1-date').value, desc=$('p1-desc').value.trim(),
    type=$('p1-type').value, amt=parseFloat($('p1-amt').value)||0,
    split=$('p1-split').value, a=parseFloat($('p1-a').value)||0,
    b=parseFloat($('p1-b').value)||0, note=$('p1-note').value.trim();
  if(!date||!desc||amt<=0){ $('p1-err').style.display='block'; setTimeout(()=>$('p1-err').style.display='none',2500); return; }
  $('p1-err').style.display='none';
  syncBusy();
  const row = { id:String(Date.now()), user_id:FIXED_USER_ID, date, desc, type, amt, split, a, b, note };
  const {error} = await sb.from('p1').insert(row);
  if(!error){ p1.push(row); p1Render(); p1Reset(); }
  syncDone();
}
async function p1Del(id){
  if(deleteTarget==='p1-'+id){
    syncBusy();
    await sb.from('p1').delete().eq('id',id);
    p1=p1.filter(r=>String(r.id)!==String(id));
    p1Render(); deleteTarget=null; syncDone();
  } else {
    deleteTarget='p1-'+id;
    const btn=document.querySelector(`[data-del="p1-${id}"]`);
    if(btn){btn.textContent='確認刪除';btn.classList.add('confirm');}
    setTimeout(()=>{deleteTarget=null;p1Render();},3000);
  }
}
function p1Reset(){
  $('p1-desc').value='';$('p1-amt').value='';$('p1-note').value='';
  $('p1-type').value='支出';$('p1-split').value='平分';
  $('p1-a').value='';$('p1-b').value='';
  $('p1-a').readOnly=true;$('p1-b').readOnly=true;
  $('p1-date').value=today();
  $('lbl-a').textContent='媽媽 支出';$('lbl-b').textContent='我 支出';
}
function p1Render(){
  let aExp=0,bExp=0,aInc=0,bInc=0;
  const rows=p1.map(r=>{
    const type=r.type||'支出', isIncome=(type==='收入');
    if(isIncome){aInc+=r.a;bInc+=r.b;}else{aExp+=r.a;bExp+=r.b;}
    const sc=r.split==='平分'?'tag-split':r.split==='媽媽'?'tag-a':r.split==='我'?'tag-b':'tag-custom';
    return `<tr>
      <td>${r.date}</td>
      <td><span class="tag ${isIncome?'tag-income':'tag-expense'}">${type}</span></td>
      <td>${r.desc}</td>
      <td class="mono">${fmt(r.amt)}</td>
      <td><span class="tag ${sc}">${r.split}</span></td>
      <td class="mono ${isIncome?'pos':'cv-accent'}">${isIncome?'+':''}${fmt(r.a)}</td>
      <td class="mono ${isIncome?'pos':'cv-accent2'}">${isIncome?'+':''}${fmt(r.b)}</td>
      <td>${r.note||'—'}</td>
      <td><button class="btn btn-del" data-del="p1-${r.id}" onclick="p1Del('${r.id}')">刪除</button></td>
    </tr>`;
  });
  $('p1-tbody').innerHTML=p1.length?rows.join(''):'<tr class="empty"><td colspan="9">尚無記錄</td></tr>';
  const aNet=aExp-aInc, bNet=bExp-bInc;
  $('p1-a-total').textContent=fmt(aNet);
  $('p1-b-total').textContent=fmt(bNet);
  $('p1-total').textContent=fmt(aExp+bExp);
  $('p1-income-total').textContent=fmt(aInc+bInc);
  const diff=aNet-bNet, al=$('p1-alert');
  if(Math.abs(diff)>0.5){
    al.classList.add('on');
    al.textContent=diff>0
      ?`📊 我應補給媽媽：${fmt(diff/2)}（各淨支出應為 ${fmt((aNet+bNet)/2)}，媽媽多付了 ${fmt(diff)}）`
      :`📊 媽媽應補給我：${fmt(-diff/2)}（各淨支出應為 ${fmt((aNet+bNet)/2)}，我多付了 ${fmt(-diff)}）`;
  } else al.classList.remove('on');
  roiRender();
}

// ══ PAGE 2 ══
function p2AutoCalc(){
  const rent=parseFloat($('p2-rent').value)||0, deposit=parseFloat($('p2-deposit').value)||0;
  const surplus=rent-deposit;
  $('p2-surplus').value=surplus; $('p2-each').value=(surplus/2).toFixed(0);
}
async function p2Add(){
  const date=$('p2-date').value, rent=parseFloat($('p2-rent').value)||0,
    deposit=parseFloat($('p2-deposit').value)||0, loan=parseFloat($('p2-loan').value)||0,
    bal=parseFloat($('p2-bal-input').value)||0, note=$('p2-note').value.trim();
  if(!date){ $('p2-err').style.display='block'; setTimeout(()=>$('p2-err').style.display='none',2500); return; }
  $('p2-err').style.display='none';
  const surplus=rent-deposit, each=surplus/2;
  syncBusy();
  const row={id:String(Date.now()),user_id:FIXED_USER_ID,date,rent,deposit,loan,surplus,each,bal,note};
  const {error}=await sb.from('p2').insert(row);
  if(!error){ p2.push(row); p2Render(); p2Reset(); }
  syncDone();
}
async function p2Del(id){
  if(deleteTarget==='p2-'+id){
    syncBusy();
    await sb.from('p2').delete().eq('id',id);
    p2=p2.filter(r=>String(r.id)!==String(id));
    p2Render(); deleteTarget=null; syncDone();
  } else {
    deleteTarget='p2-'+id;
    const btn=document.querySelector(`[data-del="p2-${id}"]`);
    if(btn){btn.textContent='確認刪除';btn.classList.add('confirm');}
    setTimeout(()=>{deleteTarget=null;p2Render();},3000);
  }
}
function p2Reset(){
  ['p2-rent','p2-deposit','p2-loan','p2-surplus','p2-each','p2-bal-input','p2-note'].forEach(id=>$(id).value='');
  $('p2-date').value=today();
}
function p2Render(){
  let tRent=0,tLoan=0,tEach=0,cumBal=0,lastBal=null;
  const rows=p2.map(r=>{
    tRent+=r.rent;tLoan+=r.loan;tEach+=r.each;
    cumBal+=(r.deposit-r.loan);
    if(r.bal) lastBal=r.bal;
    return `<tr>
      <td>${r.date}</td>
      <td class="mono pos">${fmt(r.rent)}</td>
      <td class="mono cv-yellow">${fmt(r.deposit)}</td>
      <td class="mono neg">${fmt(r.loan)}</td>
      <td class="mono ${r.surplus>=0?'pos':'neg'}">${fmtN(r.surplus)}</td>
      <td class="mono pos">${fmtN(r.each)}</td>
      <td class="mono ${cumBal>=0?'pos':'neg'}">${fmtN(cumBal)}</td>
      <td class="mono cv-yellow">${r.bal?fmt(r.bal):'—'}</td>
      <td>${r.note||'—'}</td>
      <td><button class="btn btn-del" data-del="p2-${r.id}" onclick="p2Del('${r.id}')">刪除</button></td>
    </tr>`;
  });
  $('p2-tbody').innerHTML=p2.length?rows.join(''):'<tr class="empty"><td colspan="10">尚無記錄</td></tr>';
  $('p2-rent-t').textContent=fmt(tRent);
  $('p2-loan-t').textContent=fmt(tLoan);
  $('p2-bal-t').textContent=lastBal!==null?fmt(lastBal):'$0';
  $('p2-each-t').textContent=tEach?fmtN(tEach):'$0';
  roiRender();
}

// ══ ROI ══
function roiRender(){
  const canvas=$('roi-chart'), emptyMsg=$('roi-chart-empty');
  if(!canvas||!emptyMsg) return;
  const myCost=p1.reduce((s,r)=>s+(r.type==='收入'?0:r.b),0);
  $('roi-mycost').textContent=fmt(myCost);
  const sorted=[...p2].sort((a,b)=>a.date.localeCompare(b.date));
  let cumCash=0; const labels=[],rateData=[],cashData=[];
  sorted.forEach(r=>{
    cumCash+=r.each;
    const rate=myCost>0?(cumCash/myCost*100):0;
    labels.push(r.date.slice(0,7));
    rateData.push(parseFloat(rate.toFixed(2)));
    cashData.push(Math.round(cumCash));
  });
  $('roi-cashback').textContent=cumCash?fmtN(cumCash):'$0';
  const finalRate=myCost>0?(cumCash/myCost*100):0;
  const rateEl=$('roi-rate');
  rateEl.textContent=fmtP(finalRate);
  rateEl.className='card-value mono '+(finalRate>=0?'cv-green':'cv-red');
  if(labels.length===0){canvas.style.display='none';emptyMsg.style.display='block';return;}
  canvas.style.display='block';emptyMsg.style.display='none';
  if(roiChart)roiChart.destroy();
  roiChart=new Chart(canvas,{
    type:'line',
    data:{labels,datasets:[
      {label:'累積報酬率 (%)',data:rateData,borderColor:'#7c6af7',backgroundColor:'rgba(124,106,247,0.08)',borderWidth:2,pointBackgroundColor:'#7c6af7',pointRadius:4,tension:0.3,fill:true,yAxisID:'y'},
      {label:'累積租金收益 ($)',data:cashData,borderColor:'#52d9a8',backgroundColor:'rgba(82,217,168,0.06)',borderWidth:2,pointBackgroundColor:'#52d9a8',pointRadius:4,tension:0.3,fill:true,yAxisID:'y1'}
    ]},
    options:{responsive:true,interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{color:'#8888a8',font:{family:'Noto Sans TC',size:11}}},
        tooltip:{backgroundColor:'#1e1e28',borderColor:'#28283a',borderWidth:1,titleColor:'#eeeef5',bodyColor:'#8888a8',
          callbacks:{label:ctx=>ctx.datasetIndex===0?` 報酬率：${ctx.parsed.y}%`:` 累積收益：$${ctx.parsed.y.toLocaleString('zh-TW')}`}}},
      scales:{
        x:{ticks:{color:'#4a4a62',font:{size:10}},grid:{color:'#28283a'}},
        y:{position:'left',ticks:{color:'#7c6af7',font:{size:10},callback:v=>v+'%'},grid:{color:'#28283a'}},
        y1:{position:'right',ticks:{color:'#52d9a8',font:{size:10},callback:v=>'$'+v.toLocaleString('zh-TW')},grid:{drawOnChartArea:false}}
      }}
  });
}
</script>
